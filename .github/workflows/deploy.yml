name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build decks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build fundamentals deck
        run: npm run build:fundamentals

      - name: Build token-economy deck
        run: npm run build:economy

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize deck URLs
        run: |
          {
            echo "## Deployed decks"
            echo "- Fundamentals: ${{ steps.deployment.outputs.page_url }}"
            echo "- Token Economy: ${{ steps.deployment.outputs.page_url }}token-economy/"
          } >> "$GITHUB_STEP_SUMMARY"
