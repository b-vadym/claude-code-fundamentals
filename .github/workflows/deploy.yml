name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build decks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all workshop decks
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Summarize deck URLs
        run: |
          page_url="${{ steps.deployment.outputs.page_url }}"
          {
            echo "## Deployed decks"
            node -e "
              const cfg = require('./workshops.config.json');
              const baseUrl = process.env.PAGE_URL.replace(/\/$/, '');
              for (const e of cfg) {
                const sub = e.out === 'dist' ? '' : '/' + e.out.replace(/^dist\//, '');
                console.log('- ' + e.title + ': ' + baseUrl + sub + '/');
              }
            "
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
